<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harrogate Sea Cadets – Events</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; background: #f5f7fa; color: #333; }
  header { background: #1a2e4a; color: white; padding: 24px 20px; text-align: center; }
  header h1 { margin: 0 0 6px; font-size: 26px; }
  header p { margin: 0; opacity: 0.8; font-size: 14px; }
  .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
  .event-card { background: white; border-radius: 10px; padding: 22px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
  .event-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
  .no-events { text-align: center; color: #888; padding: 60px 20px; font-size: 16px; }
</style>
</head>
<body>
<header>
  <h1>⚓ Harrogate Sea Cadets</h1>
  <p>Upcoming events – click an event to sign up</p>
</header>
<div class="container">
  
    <div class="event-card" onclick="openModal('rvjvjo5acjamn68tqb1')">
      <h3 style="margin:0 0 10px;font-size:18px;color:#1a2e4a">Easter Sailing (Stage 1)</h3>
      <p style="margin:0 0 6px;color:#555;font-size:14px">📅 8 Apr 2026 – 10 Apr 2026</p>
      <p style="margin:0 0 14px;color:#555;font-size:14px">📍 Ripon Sailing Club</p>
      
      <button onclick="event.stopPropagation();openModal('rvjvjo5acjamn68tqb1')" style="background:#1a2e4a;color:white;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600">Sign Up →</button>
    </div>
</div>


    <div id="modal-rvjvjo5acjamn68tqb1" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;padding:20px">
      <div style="background:white;border-radius:12px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;padding:30px;position:relative">
        <button onclick="closeModal('rvjvjo5acjamn68tqb1')" style="position:absolute;top:16px;right:16px;background:none;border:none;font-size:22px;cursor:pointer;color:#888;line-height:1">×</button>
        <h2 style="margin:0 0 8px;font-size:22px;color:#1a2e4a">Easter Sailing (Stage 1)</h2>
        <p style="margin:0 0 4px;color:#555;font-size:14px">📅 8 Apr 2026 – 10 Apr 2026</p>
        <p style="margin:0 0 20px;color:#555;font-size:14px">📍 Ripon Sailing Club</p>
        <hr style="margin:0 0 20px;border:none;border-top:1px solid #eee">
        <form id="form-rvjvjo5acjamn68tqb1" onsubmit="submitForm(event, 'rvjvjo5acjamn68tqb1', [{"id": "h1cxlid389rmn68timh", "label": "Cadet name"}])">
          <div style="margin-bottom:16px"><label for="h1cxlid389rmn68timh" style="display:block;font-weight:600;margin-bottom:6px;font-size:14px">Cadet name <span style="color:red">*</span></label><input type="text" id="h1cxlid389rmn68timh" name="h1cxlid389rmn68timh" required style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:14px;box-sizing:border-box"></div>
          <button type="submit" id="btn-rvjvjo5acjamn68tqb1" style="background:#1a2e4a;color:white;border:none;padding:12px 28px;border-radius:6px;cursor:pointer;font-size:15px;font-weight:600;width:100%">Sign Up</button>
          <div id="msg-rvjvjo5acjamn68tqb1" style="margin-top:12px;text-align:center;font-size:14px"></div>
        </form>
      </div>
    </div>

<script>
function openModal(id) {
  var m = document.getElementById('modal-' + id);
  m.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function closeModal(id) {
  document.getElementById('modal-' + id).style.display = 'none';
  document.body.style.overflow = '';
}
window.addEventListener('click', function(e) {
  if (e.target.style && e.target.style.position === 'fixed') {
    e.target.style.display = 'none';
    document.body.style.overflow = '';
  }
});
async function submitForm(e, eventId, fields) {
  e.preventDefault();
  var btn = document.getElementById('btn-' + eventId);
  var msg = document.getElementById('msg-' + eventId);
  var form = document.getElementById('form-' + eventId);
  
  btn.disabled = true;
  btn.textContent = 'Submitting...';
  msg.textContent = '';
  
  var responses = {};
  fields.forEach(function(f) {
    var el = form.elements[f.id];
    if (el) responses[f.label] = el.type === 'checkbox' ? el.checked : el.value;
  });
  
  var payload = { event_id: eventId, responses: responses, submitted_at: new Date().toISOString() };
  
  try {
    await fetch('https://hooks.tasklet.ai/whe_v1r68mdafd7qcat27gmx', {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    // no-cors responses are opaque - if fetch didn't throw, treat as success
    form.style.display = 'none';
    msg.style.color = '#1a7a4a';
    msg.innerHTML = '✅ <strong>You\'re signed up!</strong> We\'ll be in touch with more details.';
    msg.style.display = 'block';
  } catch(err) {
    btn.disabled = false;
    btn.textContent = 'Sign Up';
    msg.style.color = '#c0392b';
    msg.textContent = '❌ Network error. Please try again.';
  }
}
</script>
</body>
</html>
