<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harrogate Sea Cadets – Events</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0d2137;
      color: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #1a3a5c;
      border-bottom: 3px solid #c9a84c;
      padding: 20px 24px;
      text-align: center;
    }
    header h1 {
      font-size: 2rem;
      color: #c9a84c;
      letter-spacing: 1px;
    }
    header p {
      color: #a0b8d0;
      margin-top: 4px;
      font-size: 0.95rem;
    }
    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
      flex: 1;
    }
    .section-title {
      font-size: 1.4rem;
      color: #c9a84c;
      margin-bottom: 24px;
      border-bottom: 1px solid #2a4a6c;
      padding-bottom: 8px;
    }
    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }
    .event-card {
      background: #1a3a5c;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .event-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    }
    .event-card-header {
      height: 6px;
      background: linear-gradient(90deg, #c9a84c, #e8c76a);
    }
    .event-card-body {
      padding: 20px;
    }
    .event-title {
      font-size: 1.15rem;
      color: #f0f4f8;
      margin-bottom: 12px;
      line-height: 1.3;
    }
    .event-meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
      font-size: 0.88rem;
      color: #8ab0cc;
    }
    .event-desc {
      font-size: 0.9rem;
      color: #a0b8d0;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .btn-signup {
      background: #c9a84c;
      color: #0d2137;
      border: none;
      padding: 10px 22px;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
    }
    .btn-signup:hover { background: #e8c76a; }
    /* Modal */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      overflow-y: auto;
      padding: 20px;
    }
    .modal.active { display: flex; align-items: flex-start; justify-content: center; }
    .modal-content {
      background: #1a3a5c;
      border-radius: 12px;
      padding: 32px;
      max-width: 540px;
      width: 100%;
      position: relative;
      margin: auto;
      border-top: 4px solid #c9a84c;
    }
    .modal-close {
      position: absolute;
      top: 14px; right: 16px;
      background: none;
      border: none;
      color: #a0b8d0;
      font-size: 1.6rem;
      cursor: pointer;
      line-height: 1;
    }
    .modal-close:hover { color: #f0f4f8; }
    .modal-content h2 {
      color: #c9a84c;
      margin-bottom: 8px;
      font-size: 1.3rem;
    }
    .modal-meta {
      color: #8ab0cc;
      font-size: 0.88rem;
      margin-bottom: 22px;
    }
    .field-group {
      margin-bottom: 16px;
    }
    .field-group label {
      display: block;
      color: #a0b8d0;
      font-size: 0.9rem;
      margin-bottom: 5px;
    }
    .field-group input, .field-group textarea, .field-group select {
      width: 100%;
      background: #0d2137;
      border: 1px solid #2a4a6c;
      border-radius: 6px;
      padding: 9px 12px;
      color: #f0f4f8;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }
    .field-group input:focus, .field-group textarea:focus, .field-group select:focus {
      outline: none;
      border-color: #c9a84c;
    }
    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .checkbox-group input { width: auto; }
    .req { color: #e05a5a; margin-left: 2px; }
    .btn-submit {
      background: #c9a84c;
      color: #0d2137;
      border: none;
      padding: 11px 28px;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn-submit:hover { background: #e8c76a; }
    .thanks-msg {
      text-align: center;
      color: #5dd47e;
      font-size: 1.05rem;
      padding: 20px 0 8px;
    }
    footer {
      background: #1a3a5c;
      border-top: 2px solid #c9a84c;
      text-align: center;
      padding: 18px;
      color: #8ab0cc;
      font-size: 0.88rem;
    }
    @media (max-width: 600px) {
      header h1 { font-size: 1.4rem; }
      .modal-content { padding: 20px 16px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>&#9875; Harrogate Sea Cadets</h1>
    <p>Upcoming Events &amp; Activities</p>
  </header>
  <div class="container">
    <h2 class="section-title">Upcoming Events</h2>
    <div class="events-grid">
      
    <div class="event-card">
      <div class="event-card-header"></div>
      <div class="event-card-body">
        <h3 class="event-title">Easter Sailing (Stage 1)</h3>
        <div class="event-meta">
          <span class="event-date">&#128197; 8–10 April 2026</span>
          <span class="event-location">&#128205; Ripon Sailing Club</span>
        </div>
        
        <button class="btn-signup" onclick="openModal('rvjvjo5acjamn68tqb1')">Sign Up</button>
      </div>
    </div>
    
    </div>
  </div>
  
    <div id="modal-rvjvjo5acjamn68tqb1" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title-rvjvjo5acjamn68tqb1">
      <div class="modal-content">
        <button class="modal-close" onclick="closeModal('rvjvjo5acjamn68tqb1')" aria-label="Close">&times;</button>
        <h2 id="modal-title-rvjvjo5acjamn68tqb1">Easter Sailing (Stage 1)</h2>
        <p class="modal-meta">&#128197; 8–10 April 2026 &nbsp;|&nbsp; &#128205; Ripon Sailing Club</p>
        <form id="form-rvjvjo5acjamn68tqb1" onsubmit="submitForm(event, 'rvjvjo5acjamn68tqb1')">
          <div class="field-group"><label for="h1cxlid389rmn68timh">Cadet name<span class="req">*</span></label><input type="text" id="h1cxlid389rmn68timh" name="Cadet name" required></div>
          <button type="submit" class="btn-submit">Submit Sign Up</button>
        </form>
        <div id="thanks-rvjvjo5acjamn68tqb1" class="thanks-msg" style="display:none;">
          &#10003; Thank you! Your signup has been received.
        </div>
      </div>
    </div>
    
  <footer>Harrogate Sea Cadets | Events Portal</footer>
  <script>
    const EVENTS = {"rvjvjo5acjamn68tqb1": {"title": "Easter Sailing (Stage 1)", "fields": [{"id": "h1cxlid389rmn68timh", "field_type": "text", "label": "Cadet name", "required": 1, "options": [], "field_order": 0}]}};
    const WEBHOOK = "https://hooks.tasklet.ai/whe_v1r68mdafd7qcat27gmx";

    function openModal(id) {
      document.getElementById('modal-' + id).classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function closeModal(id) {
      document.getElementById('modal-' + id).classList.remove('active');
      document.body.style.overflow = '';
    }
    window.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        document.querySelectorAll('.modal.active').forEach(m => {
          m.classList.remove('active');
        });
        document.body.style.overflow = '';
      }
    });
    window.addEventListener('click', function(e) {
      if (e.target.classList.contains('modal')) {
        e.target.classList.remove('active');
        document.body.style.overflow = '';
      }
    });
    async function submitForm(e, eventId) {
      e.preventDefault();
      const form = document.getElementById('form-' + eventId);
      const eventData = EVENTS[eventId];
      const data = {};
      const inputs = form.querySelectorAll('input, textarea, select');
      inputs.forEach(input => {
        const name = input.getAttribute('name');
        if (!name) return;
        if (input.type === 'checkbox') {
          data[name] = input.checked;
        } else {
          data[name] = input.value;
        }
      });
      const payload = { event_id: eventId, data: data };
      try {
        await fetch(WEBHOOK, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
      } catch(err) {
        // no-cors: errors expected
      }
      form.style.display = 'none';
      document.getElementById('thanks-' + eventId).style.display = 'block';
    }
  </script>
</body>
</html>
