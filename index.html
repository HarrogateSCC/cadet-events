<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harrogate Sea Cadets – Event Sign Up</title>
<style>
  body { font-family: Arial, sans-serif; background: #f0f4f8; margin: 0; padding: 0; }
  .header { background: #1a3a5c; color: white; padding: 28px 20px; text-align: center; }
  .header h1 { margin: 0; font-size: 1.8rem; }
  .header p { margin: 8px 0 0; opacity: 0.85; }
  .container { max-width: 720px; margin: 32px auto; padding: 0 16px; }
  button:hover { opacity: 0.9; }
</style>
</head>
<body>
<div class="header">
  <h1>⚓ Harrogate Sea Cadets</h1>
  <p>Upcoming Events – Sign Up Below</p>
</div>
<div class="container">

<div style="background:white;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);padding:28px;margin-bottom:28px">
  <h2 style="margin:0 0 6px;color:#1a3a5c;font-size:1.4rem">Easter Sailing (Stage 1)</h2>
  <div style="color:#555;margin-bottom:4px">📅 8 Apr 2026 – 10 Apr 2026</div>
  <div style="color:#555;margin-bottom:16px">📍 Ripon Sailing Club</div>
  
  <form id="form-rvjvjo5acjamn68tqb1" onsubmit="submitForm(event, 'rvjvjo5acjamn68tqb1')">
    <div style="margin-bottom:12px"><label>Cadet name <span style="color:red">*</span><br><input type="text" name="h1cxlid389rmn68timh" required style="width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;margin-top:4px"></label></div>
    <button type="submit" style="margin-top:12px;background:#1a3a5c;color:white;border:none;padding:12px 28px;border-radius:6px;cursor:pointer;font-size:1rem">Sign Up</button>
    <div id="msg-rvjvjo5acjamn68tqb1" style="margin-top:10px;font-weight:bold"></div>
  </form>
</div>

<p style="text-align:center;color:#888;font-size:0.85rem;margin-top:40px">Harrogate Sea Cadet Unit &bull; Questions? Contact your unit XO</p>
</div>
<script>
async function submitForm(e, eventId) {
  e.preventDefault();
  const form = e.target;
  const msg = document.getElementById('msg-' + eventId);
  const data = {};
  new FormData(form).forEach((v, k) => data[k] = v);
  msg.style.color = '#555';
  msg.textContent = 'Submitting...';
  try {
    const res = await fetch('https://hooks.tasklet.ai/whe_v1r68mdafd7qcat27gmx', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ event_id: eventId, responses: data })
    });
    if (res.ok) {
      msg.style.color = 'green';
      msg.textContent = '✅ Thank you! Your signup has been received.';
      form.reset();
    } else {
      msg.style.color = 'red';
      msg.textContent = '❌ Something went wrong. Please try again.';
    }
  } catch(err) {
    msg.style.color = 'red';
    msg.textContent = '❌ Network error. Please try again.';
  }
}
</script>
</body>
</html>
